name: 📄 Stáhnout a odeslat faktury

# Runs automatically on the 2nd day of each month at 09:00 UTC
# Adjust the cron expression or add TZ if you prefer local time.
on:
  schedule:
    - cron: '0 9 2 * *'   # 2. den v měsíci, 09:00 UTC
  workflow_dispatch:      # Allows manual triggering from the UI

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run the invoice script
      - name: Execute invoice bot
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_BUSINESS_ID: ${{ secrets.META_BUSINESS_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ACCOUNTANT_EMAIL: ${{ secrets.ACCOUNTANT_EMAIL }}
        run: |
          python run_invoice.py
