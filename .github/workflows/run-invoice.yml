name: 📄 Stáhnout a odeslat faktury

# Spouští se 2. den v měsíci v 09:00 UTC.
on:
  schedule:
    - cron: '0 9 2 * *'   # 2. den v měsíci, 09:00 UTC
  workflow_dispatch:
    inputs:
      debug_dump:
        description: "Zapnout screenshoty + HTML dumpy v alert e-mailech"
        type: boolean
        default: false
      period_override:
        description: "Vynutit období YYYY-MM (jinak minulý měsíc)"
        type: string
        required: false

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Execute invoice bot
        env:
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          FB_COOKIES_JSON:    ${{ secrets.FB_COOKIES_JSON }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          ACCOUNTANT_EMAIL:   ${{ secrets.ACCOUNTANT_EMAIL }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          DEBUG_DUMP:         ${{ inputs.debug_dump && '1' || '0' }}
          PERIOD_OVERRIDE:    ${{ inputs.period_override }}
          HEADLESS:           '1'
        run: python run_invoice.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            debug/
            invoices/
          if-no-files-found: ignore
          retention-days: 7
