name: 📄 Stáhnout a odeslat faktury

# Spouští se 2. den v měsíci v 09:00 UTC.
# Pokud chceš lokální čas, uprav cron nebo použij `TZ` env proměnnou na úrovni jobu.
on:
  schedule:
    - cron: '0 9 2 * *'   # 2. den v měsíci, 09:00 UTC
  workflow_dispatch:      # umožňuje ruční spuštění z GitHub UI

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute invoice bot
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_BUSINESS_ID:  ${{ secrets.META_BUSINESS_ID }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          ACCOUNTANT_EMAIL:  ${{ secrets.ACCOUNTANT_EMAIL }}
        run: python run_invoice.py
